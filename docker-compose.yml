services:
  postgres:
    image: postgres:16
    container_name: postgres_bookshop
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bookshop
    ports:
      - '5433:5432'
    volumes:
      - bookshop_postgres_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_bookshop
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '8082:80'
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: redis_local
    ports:
      - '6379:6379'
    restart: always

  maildev:
    image: maildev/maildev
    container_name: maildev
    ports:
      - '1080:1080'
      - '1025:1025'
    restart: always

volumes:
  bookshop_postgres_data:
